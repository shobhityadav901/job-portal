<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apply for Job - CareerHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 500px;">
    <div class="card shadow p-4 border-0" style="border-radius: 15px;">
        <h3 class="text-center text-primary mb-4">Job Application Form</h3>
        
        <form action="/submit_application" method="POST">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" placeholder="Shobhit Yadav" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="shobhit@example.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Why should we hire you?</label>
                <textarea class="form-control" rows="3" placeholder="Tell us about your skills..."></textarea>
            </div>
            <div class="mb-4">
                <label class="form-label">Upload Resume (Optional)</label>
                <input type="file" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary w-100">Submit Application</button>
        </form>
        
        <div class="text-center mt-3">
            <a href="/" class="text-muted text-decoration-none small">← Back to Jobs</a>
        </div>
    </div>
</div>

</body>
</html>
